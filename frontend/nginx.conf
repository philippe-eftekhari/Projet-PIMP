server {
    listen 80;

    # Les appels /api sont relayes vers le conteneur backend (nom de service docker).
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # uploads d'etiquettes (images) volumineux
        client_max_body_size 10m;
    }

    # Images d'etiquettes servies par l'API.
    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
        proxy_set_header Host $host;
    }

    # SPA : toute autre route renvoie index.html (routage cote client).
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
