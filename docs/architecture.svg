<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="Inter, Arial, sans-serif">
  <rect width="980" height="620" fill="#ffffff"/>
  <text x="490" y="36" text-anchor="middle" font-size="22" font-weight="800" fill="#1e293b">Architecture de la plateforme PIMP</text>

  <!-- Frontend layer -->
  <rect x="40" y="70" width="900" height="120" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="60" y="96" font-size="14" font-weight="700" fill="#4338ca">COUCHE PRÉSENTATION — React 18 + Vite (SPA)</text>
  <g font-size="12" fill="#1e293b">
    <rect x="60" y="110" width="150" height="60" rx="10" fill="#fff" stroke="#c7d2fe"/>
    <text x="135" y="135" text-anchor="middle" font-weight="700">Tableau de bord</text>
    <text x="135" y="153" text-anchor="middle" fill="#64748b">KPI qualité</text>

    <rect x="230" y="110" width="150" height="60" rx="10" fill="#fff" stroke="#c7d2fe"/>
    <text x="305" y="135" text-anchor="middle" font-weight="700">Catalogue</text>
    <text x="305" y="153" text-anchor="middle" fill="#64748b">recherche / filtres</text>

    <rect x="400" y="110" width="160" height="60" rx="10" fill="#fff" stroke="#c7d2fe"/>
    <text x="480" y="135" text-anchor="middle" font-weight="700">Éditeur produit</text>
    <text x="480" y="153" text-anchor="middle" fill="#64748b">attributs / langues</text>

    <rect x="580" y="110" width="150" height="60" rx="10" fill="#fff" stroke="#c7d2fe"/>
    <text x="655" y="135" text-anchor="middle" font-weight="700">Workflow</text>
    <text x="655" y="153" text-anchor="middle" fill="#64748b">validation</text>

    <rect x="750" y="110" width="170" height="60" rx="10" fill="#fff" stroke="#c7d2fe"/>
    <text x="835" y="135" text-anchor="middle" font-weight="700">Diffusion</text>
    <text x="835" y="153" text-anchor="middle" fill="#64748b">aperçu des flux</text>
  </g>

  <!-- arrow -->
  <line x1="490" y1="190" x2="490" y2="226" stroke="#475569" stroke-width="2"/>
  <polygon points="490,238 484,226 496,226" fill="#475569"/>
  <text x="510" y="216" font-size="12" fill="#475569">REST / JSON · JWT (Bearer)</text>

  <!-- Backend layer -->
  <rect x="40" y="240" width="900" height="200" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="60" y="266" font-size="14" font-weight="700" fill="#047857">COUCHE MÉTIER / API — FastAPI (Python)</text>
  <g font-size="12" fill="#1e293b">
    <rect x="60" y="282" width="200" height="50" rx="10" fill="#fff" stroke="#a7f3d0"/>
    <text x="160" y="312" text-anchor="middle" font-weight="700">Routers REST</text>
    <rect x="60" y="342" width="200" height="50" rx="10" fill="#fff" stroke="#a7f3d0"/>
    <text x="160" y="372" text-anchor="middle" font-weight="700">Auth &amp; rôles (JWT)</text>

    <rect x="280" y="282" width="220" height="50" rx="10" fill="#fff" stroke="#a7f3d0"/>
    <text x="390" y="305" text-anchor="middle" font-weight="700">Moteur de complétude</text>
    <text x="390" y="322" text-anchor="middle" fill="#64748b">qualité des données</text>
    <rect x="280" y="342" width="220" height="50" rx="10" fill="#fff" stroke="#a7f3d0"/>
    <text x="390" y="365" text-anchor="middle" font-weight="700">Moteur de workflow</text>
    <text x="390" y="382" text-anchor="middle" fill="#64748b">transitions / gouvernance</text>

    <rect x="520" y="282" width="200" height="50" rx="10" fill="#fff" stroke="#a7f3d0"/>
    <text x="620" y="305" text-anchor="middle" font-weight="700">Mapping par canal</text>
    <text x="620" y="322" text-anchor="middle" fill="#64748b">e-com / market / mobile</text>
    <rect x="520" y="342" width="200" height="50" rx="10" fill="#fff" stroke="#a7f3d0"/>
    <text x="620" y="372" text-anchor="middle" font-weight="700">Validation Pydantic</text>

    <rect x="740" y="282" width="180" height="110" rx="10" fill="#fff" stroke="#a7f3d0"/>
    <text x="830" y="320" text-anchor="middle" font-weight="700">ORM SQLAlchemy</text>
    <text x="830" y="340" text-anchor="middle" fill="#64748b">modèle de données</text>
    <text x="830" y="360" text-anchor="middle" fill="#64748b">produit (master data)</text>
  </g>

  <!-- arrow -->
  <line x1="490" y1="440" x2="490" y2="476" stroke="#475569" stroke-width="2"/>
  <polygon points="490,488 484,476 496,476" fill="#475569"/>

  <!-- Data layer -->
  <rect x="40" y="490" width="600" height="100" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="60" y="516" font-size="14" font-weight="700" fill="#b45309">COUCHE DONNÉES</text>
  <text x="60" y="544" font-size="13" fill="#1e293b">Base relationnelle — SQLite (dev) / PostgreSQL (prod)</text>
  <text x="60" y="566" font-size="12" fill="#64748b">Products · Families · Attributes · Categories · Assets · Users · WorkflowLogs</text>

  <!-- Channels out -->
  <rect x="660" y="490" width="280" height="100" rx="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="680" y="516" font-size="14" font-weight="700" fill="#1d4ed8">CANAUX DE DIFFUSION</text>
  <g font-size="11" fill="#1e3a8a">
    <text x="680" y="540">• Site e-commerce (JSON)</text>
    <text x="680" y="558">• Marketplace (JSON)</text>
    <text x="810" y="540">• Catalogue (CSV)</text>
    <text x="810" y="558">• App mobile (JSON)</text>
  </g>
</svg>
