<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="Inter, Arial, sans-serif">
  <rect width="1000" height="660" fill="#ffffff"/>
  <text x="500" y="34" text-anchor="middle" font-size="20" font-weight="800" fill="#1e293b">Diagramme de cas d'utilisation — PIMP</text>

  <!-- system boundary -->
  <rect x="300" y="60" width="400" height="560" rx="12" fill="#f8fafc" stroke="#6366f1" stroke-width="2"/>
  <text x="500" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">Plateforme PIMP</text>

  <style>
    .uc{fill:#eef2ff;stroke:#6366f1;stroke-width:1.5}
    .uct{font-size:12px;fill:#1e293b;text-anchor:middle}
    .actor line, .actor circle{stroke:#334155;stroke-width:2;fill:none}
    .an{font-size:12px;font-weight:700;fill:#1e293b;text-anchor:middle}
    .assoc{stroke:#94a3b8;stroke-width:1.2}
    .inc{stroke:#64748b;stroke-width:1;stroke-dasharray:4 3}
    .inct{font-size:9px;fill:#64748b}
  </style>

  <!-- use cases (ellipses) -->
  <g>
    <ellipse class="uc" cx="500" cy="120" rx="78" ry="20"/><text class="uct" x="500" y="124">S'authentifier</text>
    <ellipse class="uc" cx="430" cy="175" rx="85" ry="20"/><text class="uct" x="430" y="179">Consulter catalogue</text>
    <ellipse class="uc" cx="430" cy="225" rx="85" ry="20"/><text class="uct" x="430" y="229">Créer un produit</text>
    <ellipse class="uc" cx="430" cy="275" rx="95" ry="22"/><text class="uct" x="430" y="272">Enrichir un produit</text><text class="uct" x="430" y="285" font-size="9" fill="#64748b">(attributs, langues, médias)</text>
    <ellipse class="uc" cx="430" cy="330" rx="95" ry="20"/><text class="uct" x="430" y="334">Consulter la complétude</text>
    <ellipse class="uc" cx="565" cy="385" rx="95" ry="20"/><text class="uct" x="565" y="389">Soumettre à validation</text>
    <ellipse class="uc" cx="565" cy="435" rx="80" ry="20"/><text class="uct" x="565" y="439">Valider un produit</text>
    <ellipse class="uc" cx="565" cy="485" rx="80" ry="20"/><text class="uct" x="565" y="489">Publier un produit</text>
    <ellipse class="uc" cx="430" cy="535" rx="90" ry="20"/><text class="uct" x="430" y="539">Gérer les catégories</text>
    <ellipse class="uc" cx="430" cy="585" rx="90" ry="20"/><text class="uct" x="430" y="589">Tableau de bord qualité</text>
    <ellipse class="uc" cx="640" cy="585" rx="78" ry="20"/><text class="uct" x="640" y="589">Exporter un flux</text>
  </g>

  <!-- include to authentification -->
  <line class="inc" x1="430" y1="155" x2="480" y2="135"/>
  <line class="inc" x1="565" y1="415" x2="510" y2="135"/>
  <text class="inct" x="455" y="150">«include»</text>

  <!-- Actor: Marketing -->
  <g class="actor" transform="translate(120,180)">
    <circle cx="0" cy="0" r="11"/><line x1="0" y1="11" x2="0" y2="38"/>
    <line x1="-16" y1="20" x2="16" y2="20"/><line x1="0" y1="38" x2="-13" y2="58"/><line x1="0" y1="38" x2="13" y2="58"/>
  </g>
  <text class="an" x="120" y="78" dy="0"></text>
  <text class="an" x="120" y="255">Marketing</text>
  <line class="assoc" x1="140" y1="180" x2="345" y2="175"/>
  <line class="assoc" x1="140" y1="185" x2="335" y2="275"/>
  <line class="assoc" x1="140" y1="190" x2="335" y2="330"/>
  <line class="assoc" x1="140" y1="195" x2="345" y2="225"/>
  <line class="assoc" x1="140" y1="200" x2="470" y2="385"/>

  <!-- Actor: Achats / Fournisseur (contributeurs) -->
  <g class="actor" transform="translate(120,360)">
    <circle cx="0" cy="0" r="11"/><line x1="0" y1="11" x2="0" y2="38"/>
    <line x1="-16" y1="20" x2="16" y2="20"/><line x1="0" y1="38" x2="-13" y2="58"/><line x1="0" y1="38" x2="13" y2="58"/>
  </g>
  <text class="an" x="120" y="435">Achats /</text>
  <text class="an" x="120" y="451">Fournisseur</text>
  <line class="assoc" x1="140" y1="360" x2="335" y2="275"/>
  <line class="assoc" x1="140" y1="365" x2="335" y2="330"/>

  <!-- Actor: Administrateur / Data steward -->
  <g class="actor" transform="translate(880,300)">
    <circle cx="0" cy="0" r="11"/><line x1="0" y1="11" x2="0" y2="38"/>
    <line x1="-16" y1="20" x2="16" y2="20"/><line x1="0" y1="38" x2="-13" y2="58"/><line x1="0" y1="38" x2="13" y2="58"/>
  </g>
  <text class="an" x="880" y="378">Administrateur</text>
  <text class="an" x="880" y="394">(Data steward)</text>
  <line class="assoc" x1="860" y1="300" x2="645" y2="435"/>
  <line class="assoc" x1="860" y1="305" x2="645" y2="485"/>
  <line class="assoc" x1="860" y1="295" x2="520" y2="535"/>
  <line class="assoc" x1="860" y1="290" x2="520" y2="585"/>

  <!-- Actor: Canal externe (système) -->
  <g class="actor" transform="translate(880,560)">
    <rect x="-18" y="-14" width="36" height="28" fill="none" stroke="#334155" stroke-width="2"/>
    <text x="0" y="4" font-size="10" text-anchor="middle" fill="#334155">SYS</text>
  </g>
  <text class="an" x="880" y="600">Canal externe</text>
  <text class="an" x="880" y="616" font-size="10" fill="#64748b">(e-commerce, marketplace…)</text>
  <line class="assoc" x1="855" y1="560" x2="718" y2="585"/>
</svg>
