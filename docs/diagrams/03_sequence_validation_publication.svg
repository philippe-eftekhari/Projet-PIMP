<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="Inter, Arial, sans-serif">
  <rect width="1000" height="660" fill="#ffffff"/>
  <text x="500" y="30" text-anchor="middle" font-size="19" font-weight="800" fill="#1e293b">Séquence — Validation &amp; publication omnicanale</text>
  <style>
    .ll{stroke:#94a3b8;stroke-width:1;stroke-dasharray:4 4}
    .head{fill:#eef2ff;stroke:#6366f1;stroke-width:1.5}
    .ht{font-size:12px;font-weight:700;fill:#3730a3;text-anchor:middle}
    .msg{stroke:#1e293b;stroke-width:1.4}
    .ret{stroke:#10b981;stroke-width:1.2;stroke-dasharray:5 3}
    .mt{font-size:11px;fill:#1e293b}
    .rt{font-size:11px;fill:#047857}
    .err{stroke:#ef4444;stroke-width:1.2;stroke-dasharray:5 3}
    .et{font-size:11px;fill:#b91c1c}
    .note{fill:#fef3c7;stroke:#f59e0b}
    .nt{font-size:10px;fill:#92400e}
    .frame{fill:none;stroke:#6366f1;stroke-width:1}
  </style>

  <rect class="head" x="30"  y="55" width="110" height="34" rx="6"/><text class="ht" x="85"  y="77">Marketing</text>
  <rect class="head" x="200" y="55" width="110" height="34" rx="6"/><text class="ht" x="255" y="71">Admin /</text><text class="ht" x="255" y="84">Data steward</text>
  <rect class="head" x="430" y="55" width="120" height="34" rx="6"/><text class="ht" x="490" y="77">API FastAPI</text>
  <rect class="head" x="640" y="55" width="120" height="34" rx="6"/><text class="ht" x="700" y="77">BDD</text>
  <rect class="head" x="830" y="55" width="140" height="34" rx="6"/><text class="ht" x="900" y="71">Canal externe</text><text class="ht" x="900" y="84">(e-commerce…)</text>

  <line class="ll" x1="85"  y1="89" x2="85"  y2="620"/>
  <line class="ll" x1="255" y1="89" x2="255" y2="620"/>
  <line class="ll" x1="490" y1="89" x2="490" y2="620"/>
  <line class="ll" x1="700" y1="89" x2="700" y2="620"/>
  <line class="ll" x1="900" y1="89" x2="900" y2="620"/>

  <!-- submit -->
  <line class="msg" x1="85" y1="120" x2="485" y2="120" marker-end="url(#a)"/>
  <text class="mt" x="95" y="115">POST /transition { in_review }</text>
  <line class="msg" x1="490" y1="148" x2="490" y2="148"/>
  <text class="mt" x="300" y="143" fill="#b45309">[ si complétude &lt; 60% ]</text>
  <line class="err" x1="485" y1="160" x2="90" y2="160" marker-end="url(#c)"/>
  <text class="et" x="120" y="155">400 — complétude insuffisante</text>

  <line class="msg" x1="85" y1="195" x2="485" y2="195" marker-end="url(#a)"/>
  <text class="mt" x="95" y="190">POST /transition { in_review } (≥ 60%)</text>
  <line class="ret" x1="485" y1="218" x2="90" y2="218" marker-end="url(#b)"/>
  <text class="rt" x="120" y="213">statut = en revue</text>

  <!-- approve -->
  <line class="msg" x1="255" y1="255" x2="485" y2="255" marker-end="url(#a)"/>
  <text class="mt" x="265" y="250">POST /transition { approved }</text>
  <line class="msg" x1="490" y1="283" x2="490" y2="283"/>
  <text class="mt" x="300" y="278" fill="#b45309">[ contrôle rôle = admin ]</text>
  <line class="msg" x1="490" y1="295" x2="695" y2="295" marker-end="url(#a)"/>
  <text class="mt" x="510" y="290">INSERT WorkflowLog ; UPDATE statut</text>
  <line class="ret" x1="485" y1="320" x2="260" y2="320" marker-end="url(#b)"/>
  <text class="rt" x="275" y="315">statut = validé</text>

  <!-- publish -->
  <line class="msg" x1="255" y1="358" x2="485" y2="358" marker-end="url(#a)"/>
  <text class="mt" x="265" y="353">POST /channels/{id}/publish?channel</text>
  <line class="msg" x1="490" y1="386" x2="695" y2="386" marker-end="url(#a)"/>
  <text class="mt" x="510" y="381">UPDATE channels[] ; statut = publié</text>
  <line class="ret" x1="485" y1="411" x2="260" y2="411" marker-end="url(#b)"/>
  <text class="rt" x="275" y="406">produit publié sur le canal</text>

  <!-- external pull -->
  <line class="msg" x1="900" y1="450" x2="495" y2="450" marker-end="url(#a)"/>
  <text class="mt" x="560" y="445">GET /channels/{canal}/export</text>
  <line class="msg" x1="490" y1="478" x2="695" y2="478" marker-end="url(#a)"/>
  <text class="mt" x="510" y="473">SELECT produits publiés sur ce canal</text>
  <line class="ret" x1="495" y1="503" x2="895" y2="503" marker-end="url(#b)"/>
  <text class="rt" x="560" y="498">flux adapté (JSON / CSV)</text>

  <rect class="note" x="430" y="540" width="430" height="62" rx="8"/>
  <text class="nt" x="445" y="560">Gouvernance : seuls les produits validés/publiés sont exportables.</text>
  <text class="nt" x="445" y="576">Validation et publication réservées au rôle administrateur (RBAC).</text>
  <text class="nt" x="445" y="592">Chaque transition est tracée dans WorkflowLog (auteur, date, statuts).</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#1e293b"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#10b981"/></marker>
    <marker id="c" markerWidth="9" markerHeight="9" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#ef4444"/></marker>
  </defs>
</svg>
