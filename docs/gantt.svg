<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Inter, Arial, sans-serif">
  <rect width="960" height="420" fill="#ffffff"/>
  <text x="480" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#1e293b">Planning du projet (Gantt) — 6 semaines</text>

  <!-- week headers -->
  <g font-size="12" fill="#64748b">
    <text x="380" y="64">S1</text><text x="475" y="64">S2</text><text x="570" y="64">S3</text>
    <text x="665" y="64">S4</text><text x="760" y="64">S5</text><text x="855" y="64">S6</text>
  </g>
  <line x1="360" y1="72" x2="920" y2="72" stroke="#e2e8f0"/>
  <g stroke="#f1f5f9"><line x1="455" y1="72" x2="455" y2="390"/><line x1="550" y1="72" x2="550" y2="390"/><line x1="645" y1="72" x2="645" y2="390"/><line x1="740" y1="72" x2="740" y2="390"/><line x1="835" y1="72" x2="835" y2="390"/></g>

  <!-- rows: label, x, width, color, jh -->
  <g font-size="12" fill="#1e293b">
    <text x="20" y="98">Cadrage &amp; modélisation données</text>
    <rect x="360" y="86" width="120" height="20" rx="5" fill="#6366f1"/><text x="930" y="100" text-anchor="end" fill="#64748b">5 j-h</text>

    <text x="20" y="128">Backend : modèle, API CRUD</text>
    <rect x="420" y="116" width="180" height="20" rx="5" fill="#6366f1"/><text x="930" y="130" text-anchor="end" fill="#64748b">8 j-h</text>

    <text x="20" y="158">Complétude &amp; qualité</text>
    <rect x="550" y="146" width="95" height="20" rx="5" fill="#10b981"/><text x="930" y="160" text-anchor="end" fill="#64748b">3 j-h</text>

    <text x="20" y="188">Workflow &amp; gouvernance</text>
    <rect x="600" y="176" width="100" height="20" rx="5" fill="#10b981"/><text x="930" y="190" text-anchor="end" fill="#64748b">4 j-h</text>

    <text x="20" y="218">Frontend : catalogue &amp; éditeur</text>
    <rect x="550" y="206" width="190" height="20" rx="5" fill="#3b82f6"/><text x="930" y="220" text-anchor="end" fill="#64748b">9 j-h</text>

    <text x="20" y="248">Diffusion omnicanale</text>
    <rect x="695" y="236" width="95" height="20" rx="5" fill="#f59e0b"/><text x="930" y="250" text-anchor="end" fill="#64748b">3 j-h</text>

    <text x="20" y="278">Tableau de bord &amp; KPI</text>
    <rect x="740" y="266" width="80" height="20" rx="5" fill="#3b82f6"/><text x="930" y="280" text-anchor="end" fill="#64748b">2 j-h</text>

    <text x="20" y="308">Tests &amp; jeu de données</text>
    <rect x="740" y="296" width="120" height="20" rx="5" fill="#ef4444"/><text x="930" y="310" text-anchor="end" fill="#64748b">3 j-h</text>

    <text x="20" y="338">Rapport &amp; soutenance</text>
    <rect x="800" y="326" width="120" height="20" rx="5" fill="#8b5cf6"/><text x="930" y="340" text-anchor="end" fill="#64748b">4 j-h</text>
  </g>
  <line x1="360" y1="360" x2="920" y2="360" stroke="#e2e8f0"/>
  <text x="20" y="384" font-size="13" font-weight="700" fill="#1e293b">Charge totale estimée ≈ 41 jours-hommes (équipe de 2)</text>
</svg>
